<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalos Partners</title>
  <meta name="description" content="Kalos Partners — partners to founder-led European businesses. We grow enduring companies across Italy, the UK and France." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://kalos.partners/" />
  <meta property="og:title" content="Kalos Partners" />
  <meta property="og:description" content="Partners to founder-led European businesses." />
  <meta property="og:url" content="https://kalos.partners/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://kalos.partners/logo-export/kalos-logo-1024.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Kalos Partners" />
  <meta name="twitter:description" content="Partners to founder-led European businesses." />
  <meta name="twitter:image" content="https://kalos.partners/logo-export/kalos-logo-1024.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Libre+Franklin:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Dark forest-slate green — the green analogue to Hedosophia's blue-slate */
      --bg-1:   #1f2a24;
      --bg-2:   #2a3630;
      --text:   #ede8d8;
      --muted:  rgba(237, 232, 216, 0.45);
      --rule:   rgba(237, 232, 216, 0.35);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg-1);
      /* Subtle vertical gradient — slightly lighter in the centre */
      background-image:
        radial-gradient(ellipse at center, var(--bg-2) 0%, var(--bg-1) 80%);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Diagonal pinstripe overlay — Hedosophia signature */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent 0,
        transparent 3px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0.18) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Subtle grain on top */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.04;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 2;
    }

    .page {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 32px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-variation-settings: "opsz" 144, "SOFT" 0;
      font-size: clamp(32px, 6.5vw, 88px);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--text);
      text-align: center;
      width: 100%;
    }

    .tagline {
      margin-top: 36px;
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 1.05vw, 15px);
      color: var(--muted);
      letter-spacing: 0.04em;
      text-align: center;
    }

    .hrule {
      width: 32px;
      height: 1px;
      background: var(--rule);
      margin: 40px auto 28px;
    }

    .email {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .email:hover {
      color: var(--text);
    }

    .footer {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 36px;
      padding-top: 32px;
    }

    .footer a {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.25s ease;
    }

    .footer a:hover {
      color: var(--text);
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 16px 20px;
      }
      .wordmark {
        font-size: clamp(28px, 8.5vw, 44px);
        letter-spacing: 0.04em;
      }
      .tagline {
        margin-top: 22px;
        font-size: 12px;
        padding: 0 8px;
      }
      .hrule {
        margin: 28px auto 20px;
      }
      .email {
        font-size: 10px;
        letter-spacing: 0.18em;
      }
      .footer {
        gap: 20px;
        flex-wrap: wrap;
        padding-top: 20px;
      }
      .footer a {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="stack">
      <div class="wordmark">Kalos Partners</div>
      <div class="tagline">Partners to founder-led European businesses.</div>
      <div class="hrule"></div>
      <a class="email" href="mailto:hello@kalos.partners">hello@kalos.partners</a>
    </div>
    <div class="footer">
      <a href="/privacy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
